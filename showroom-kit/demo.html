<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gl.id Showroom Kit — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="showroom-nav.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: #12100e;
      color: #f5f0e8;
    }

    main {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    p {
      max-width: 32rem;
      color: rgba(245, 240, 232, 0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- Conteúdo do snippet.html -->
  <aside
    class="showroom-nav is-available"
    id="showroom-nav"
    aria-label="Navegação gl.id Showroom"
    data-showroom-nav
  >
    <div class="showroom-nav__panel" id="showroom-nav-panel">
      <p class="showroom-nav__eyebrow">Ambiente gl.id Showroom</p>
      <p class="showroom-nav__status">
        <span class="showroom-nav__status-label">Status:</span>
        <span class="showroom-nav__status-value" id="showroom-nav-status">Disponível</span>
      </p>
      <p class="showroom-nav__price" id="showroom-nav-price" aria-live="polite">
        <span class="showroom-nav__price-label" id="showroom-nav-price-label">Modelo SEO Local (gl.id)</span>
        <span class="showroom-nav__price-value" id="showroom-nav-price-value">R$ 2.497</span>
        <span class="showroom-nav__price-delivery" id="showroom-nav-delivery">Entrega em 72 horas</span>
      </p>
      <div class="showroom-nav__actions">
        <a
          class="showroom-nav__btn showroom-nav__btn--primary"
          id="showroom-nav-portfolio"
          href="https://www.glid.ia.br/"
          target="_blank"
          rel="noopener noreferrer"
        >Voltar ao Portfólio (gl.id)</a>
        <a
          class="showroom-nav__btn showroom-nav__btn--ghost"
          id="showroom-nav-acquire"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >Adquirir esta Estrutura</a>
      </div>
    </div>
    <button
      class="showroom-nav__toggle"
      id="showroom-nav-toggle"
      type="button"
      aria-expanded="true"
      aria-controls="showroom-nav-panel"
      aria-label="Recolher painel do showroom"
    >
      <svg class="showroom-nav__toggle-icon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
        <path d="M9 2L4 7l5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </aside>

  <main>
    <div>
      <h1>gl.id Showroom Kit</h1>
      <p>Painel lateral de demonstração. Clique na aba à esquerda para recolher e expandir.</p>
    </div>
  </main>

  <script src="contact-utils.js"></script>
  <script src="config.example.js"></script>
  <script src="showroom-nav.js"></script>
</body>
</html>
